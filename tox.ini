[tox]
envlist = 
    py{310,311}-django{42}
    py{310,311}-django{42}-coverage
    lint
    type-check

skip_missing_interpreters = True

[testenv]
deps =
    django42: Django==4.2.1
    djangorestframework==3.14.0
    django-crispy-forms==2.0
    crispy-bootstrap5==0.7
    psycopg2-binary==2.9.6
    pytest
    pytest-django
    pytest-cov
    coverage

commands =
    pytest {posargs}

setenv =
    PYTHONPATH = {toxinidir}/myapp
    DJANGO_SETTINGS_MODULE = myapp.settings

[testenv:coverage]
deps =
    {[testenv]deps}
    coverage[toml]

commands =
    coverage run -m pytest
    coverage report
    coverage html

[testenv:lint]
skip_install = True
deps =
    flake8
    flake8-docstrings
    flake8-bugbear
    pylint
    isort

commands =
    flake8 myapp --max-line-length=100 --exclude=migrations
    isort --check-only myapp

[testenv:type-check]
skip_install = True
deps =
    mypy
    django-stubs
    types-requests

commands =
    mypy myapp --ignore-missing-imports

[testenv:format]
skip_install = True
deps =
    black
    isort

commands =
    black myapp
    isort myapp

[flake8]
max-line-length = 100
exclude = 
    .git,
    __pycache__,
    venv,
    .venv,
    migrations,
    .tox
ignore = 
    E203,
    W503,
    D100

[isort]
profile = black
multi_line_mode = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
ensure_newline_before_comments = True
line_length = 100
skip_glob = 
    */migrations/*

[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
