{% extends 'todo_app/base.html' %}

{% block title %}Delete Task{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">Delete Task</h3>
            </div>
            <div class="card-body">
                <div class="alert alert-warning" role="alert">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <strong>Warning!</strong> This action cannot be undone.
                </div>
                <p>Are you sure you want to delete the task:</p>
                <h5 class="mb-3"><strong>"{{ object.name }}"</strong></h5>
                <p class="text-muted">This task will be permanently deleted.</p>
            </div>
            <div class="card-footer">
                <form method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete Task</button>
                </form>
                <a href="{% url 'todo_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
